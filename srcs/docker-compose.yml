services:
  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    image: mariadb
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - mariadb:/var/lib/mysql
    networks:
      - network
    healthcheck:
      test: [
        "CMD",
          "mariadb-admin",
          "ping",
          "-h",
          "localhost",
          "-P",
          "3306",
          "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  nginx:
    container_name: nginx
    build: ./requirements/nginx
    image: nginx
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - wordpress:/var/www/html
    depends_on:
      - wordpress
    networks:
      - network
    extra_hosts:
      - "trpham.42.fr:127.0.0.1"
     
  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    image: wordpress
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - wordpress:/var/www/html
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - network
    healthcheck:
      test: ["CMD", "test", "-f", "/var/www/html/wp-login.php"]
      interval: 5s
      timeout: 60s
      retries: 10

networks:
  network:
    name: docker-network
    driver: bridge

volumes:
  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/trpham/data/mariadb
  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/trpham/data/wordpress

  

 
 
